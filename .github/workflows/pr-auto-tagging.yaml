name: 🔖 PR autotagging

on:
  pull_request: null

jobs:
  autotagging:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🔖 Tag PR
        uses: outscale/.github/auto-tagging@7c476168e128fc5886b1019a61964f45e42e2452 # v1.1.1
