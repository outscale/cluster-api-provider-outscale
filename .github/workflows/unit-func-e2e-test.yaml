name: unit-func-e2e-test

on:
  pull_request:
    branches: [ main ]
    paths:
      - "**.go"
      - "**.yaml"
      - "!capm.yaml"
      - "!osc-secret.yaml"
      - "!example/**.yaml"
      - "!testclean/**"
      - "!helm/**"
      - "Makefile"
      - "hack/*.sh"
      - "!docs/src/**"
      - "!hack/json-format/*.sh"
      - "!hack/json-format/src/*.rs"
      - "!hack/json-format/Makefile"
      - "!hack/json-format/Cargo.*"
      - "!hack/json-format/tests/*.rs"
jobs:
  unit_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: unit-test
      run: |
        make unit-test
        cat covers.txt
      shell: bash  
  e2etest:
    runs-on: [self-hosted, linux, oks]
    needs: [unit_test]
    steps:
    - name: Checkout cluster-api-outscales
      uses: actions/checkout@v4
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.30.7
    - name: Install helm
      uses: azure/setup-helm@v4
    - name: Install kustomize
      uses: imranismail/setup-kustomize@v1
      with:
        kustomize-version: v4.5.7
    - name: 🔎 Check IP
      id: ip
      run: echo "ip=`curl -s https://api.ipify.org`" | tee $GITHUB_OUTPUT
    - name: Set ak/sk name based on runner region
      run: .github/scripts/runneraksk.sh
    - uses: outscale/frieza-github-actions/frieza-clean@master
      with:
        access_key: ${{ secrets[env.OSC_ACCESS_KEY_NAME] }}
        secret_key: ${{ secrets[env.OSC_SECRET_KEY_NAME] }}
        region: ${{ env.OSC_REGION }}
    - name: Configure OKS
      id: oks
      run: |
        .github/scripts/start_oks.sh
      env:
        OKS_CLI_DOWNLOAD_USER: ${{ secrets.OKS_CLI_DOWNLOAD_USER }}
        OKS_CLI_DOWNLOAD_PASSWORD: ${{ secrets.OKS_CLI_DOWNLOAD_PASSWORD }}
        OSC_ACCESS_KEY: ${{ secrets.OSC_ACCESS_KEY_OKS }}
        OSC_SECRET_KEY: ${{ secrets.OSC_SECRET_KEY_OKS }}
        CLUSTER_NAME: ${{ runner.name }}
        WORKER_VMTYPE: ${{ vars.WORKER_VMTYPE }}
        PUBLIC_IP: ${{ steps.ip.outputs.ip }}
    - name: Wait until harbor is ready
      uses: jupyterhub/action-k8s-await-workloads@v3
      with:
        workloads: ""
        namespace: "default" 
        timeout: 900
        max-restarts: -1
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
    - name: Install golang
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Build and Push Docker image 
      run: |
        sudo apt-get update
        sudo apt install -y docker-buildx-plugin 
        make docker-buildx
        make docker-push
        docker image prune -a -f
      env:
        IMG: ${{ steps.oks.outputs.harbor_host }}/cluster-api-outscale-controllers:${{ github.sha }}
        DOCKER_BUILDKIT: 1
    - name: Create ns and set credential
      run: make credential
      shell: bash
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
        OSC_ACCESS_KEY: ${{ secrets[env.OSC_ACCESS_KEY_NAME] }}
        OSC_SECRET_KEY: ${{ secrets[env.OSC_SECRET_KEY_NAME] }}
    - name: Deploy cluster-api
      run: make deploy-clusterapi
      id: deploy-capi
      shell: bash
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
    - name: Deploy cluster-api-outscale
      run: make deploy
      shell: bash
      id: deploy-capo
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
        IMG: ${{ steps.oks.outputs.harbor_host }}:${{ env.HARBOR_EXT_PORT }}/cluster-api-outscale-controller:${{ github.sha }}
    - name: Wait until cluster-api-outscale is ready
      uses: jupyterhub/action-k8s-await-workloads@v3
      with:
        workloads: ""
        namespace: "cluster-api-provider-outscale-system" 
        timeout: 600
        max-restarts: -1
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
    - name: Launch functional test
      run:  make e2etestexistingcluster
      shell: bash
      id: e2etest
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
        CCM_OSC_ACCESS_KEY: ${{ secrets[env.OSC_ACCESS_KEY_NAME] }}
        CCM_OSC_SECRET_KEY: ${{ secrets[env.OSC_SECRET_KEY_NAME] }}
        CCM_OSC_REGION: $${{ env.OSC_REGION }}
        IMG: ${{ env.NODEPORT_IP }}:${{ env.NODEPORT_PORT }}/cluster-api-outscale-controllers:${{ github.sha }}
        IMG_UPGRADE_FROM: ${{ vars[env.IMG_UPGRADE_FROM_NAME] }}
        IMG_UPGRADE_TO: ${{ vars[env.IMG_UPGRADE_TO_NAME] }}
    - name: Get cluster api outscale logs
      run: make logs-capo
      if: ${{ failure() && steps.e2etest.conclusion == 'failure' }}
      shell: bash
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
        CAPO_NAMESPACE: cluster-api-provider-outscale-system
    - name: Get cluster api logs
      run: make logs-capi
      if: ${{ failure() && steps.e2etest.conclusion == 'failure' }}
      shell: bash
      env:
        KUBECONFIG: ${{ steps.oks.outputs.kubeconfig }}
        CAPI_NAMESPACE: capi-kubeadm-bootstrap-system
