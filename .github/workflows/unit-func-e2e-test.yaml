name: unit-func-e2e-test

on:
  push:
    branches:
      - 'main'
    paths:
      - "**.go"
      - "**.yaml"
      - "!capm.yaml"
      - "!osc-secret.yaml"
      - "!example/**.yaml"
      - "!testclean/**"
      - "!helm/**"
      - "Makefile"
      - "hack/*.sh"
      - "!docs/src/**"
      - "!hack/json-format/*.sh"
      - "!hack/json-format/src/*.rs"
      - "!hack/json-format/Makefile"
      - "!hack/json-format/Cargo.*"
      - "!hack/json-format/tests/*.rs"
  pull_request:
    branches: [ main ]
    paths:
      - "**.go"
      - "**.yaml"
      - "!capm.yaml"
      - "!osc-secret.yaml"
      - "!example/**.yaml"
      - "!testclean/**"
      - "!helm/**"
      - "Makefile"
      - "hack/*.sh"
      - "!docs/src/**"
      - "!hack/json-format/*.sh"
      - "!hack/json-format/src/*.rs"
      - "!hack/json-format/Makefile"
      - "!hack/json-format/Cargo.*"
      - "!hack/json-format/tests/*.rs"

env:  # Global environment variables
  KUBECONFIG: ${{ github.workspace }}/rke-cluster-for-cluster-api/rke/kube_config_cluster.yml
  OSC_ACCESS_KEY: ${{ secrets.OSC_ACCESS_KEY }}
  OSC_SECRET_KEY: ${{ secrets.OSC_SECRET_KEY }}
  OSC_REGION: ${{ secrets.OSC_REGION }}
  OSC_SUBREGION_NAME: ${{ secrets.OSC_SUBREGION_NAME }}

jobs:
  setup-tools-and-common:
    runs-on: [self-hosted, linux]
    outputs:  # Output variables if needed for other jobs
      nodeport_ip: ${{ steps.retrieve-nodeport.outputs.nodeport_ip }}
      nodeport_port: ${{ steps.retrieve-nodeport.outputs.nodeport_port }}
    steps:
      - name: Checkout cluster-api-outscale
        uses: actions/checkout@v3
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Checkout osc-k8s-rke-cluster
        uses: actions/checkout@v3
        with:
          repository: 'outscale-dev/osc-k8s-rke-cluster'
          path: "rke-cluster-for-cluster-api"
          ref: master

      - name: Install kubectl
        uses: azure/setup-kubectl@v2.0
        with:
          version: v1.30.3

      - name: Install golang
        uses: actions/setup-go@v3
        with:
          go-version: '>=1.23'

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v1
        with:
          kustomize-version: v4.5.7

      - uses: outscale-dev/frieza-github-actions/frieza-clean@master
        with:
          access_key: ${{ secrets.OSC_ACCESS_KEY }}
          secret_key: ${{ secrets.OSC_SECRET_KEY }}
          region: ${{ secrets.OSC_REGION }}

      - name: Deploy Cluster
        uses: ./rke-cluster-for-cluster-api/github_actions/deploy_cluster/
        with:
          repository_folder: "rke-cluster-for-cluster-api"
          osc_access_key: ${{ secrets.OSC_ACCESS_KEY }}
          osc_secret_key: ${{ secrets.OSC_SECRET_KEY }}
          osc_region: ${{ secrets.OSC_REGION }}
          image_id: ${{ secrets.OMI_ID }}
          control_plane_vm_type: ${{ secrets.CP_VMTYPE }}
          bastion_vm_type: ${{ secrets.BASTION_VMTYPE }}
          worker_vm_type: ${{ secrets.WORKER_VMTYPE }}
          rke_version: ${{ secrets.RKE_VERSION }}
          kubernetes_version: ${{ secrets.KUBERNETES_VERSION }}

      - name: Wait Kubernetes control plane is up and running
        uses: nick-invision/retry@v2
        with:
          timeout_seconds: 30
          max_attempts: 20
          retry_wait_seconds: 30
          command: kubectl get --raw='/readyz?verbose'

      - name: Wait all infrastructure app are really up and running
        uses: jupyterhub/action-k8s-await-workloads@v1
        with:
          workloads: ""
          namespace: ""
          timeout: 600
          max-restarts: -1

      - name: Deploy Docker-registry into cluster
        run: |
          ansible-playbook addons/docker-registry/playbook.yaml
          ./addons/docker-registry/start_port_forwarding.sh &
        env:
          KUBECONFIG: rke-cluster-for-cluster-api/rke/kube_config_cluster.yml
          ANSIBLE_CONFIG: ansible.cfg
        working-directory: rke-cluster-for-cluster-api

      - name: Wait registry up
        uses: GuillaumeFalourd/wait-sleep-action@v1
        with:
          time: '2m'

      - name: Build and Push Docker image
        run: |
          sudo apt-get update
          sudo apt install -y docker-buildx-plugin
          make docker-buildx
          make docker-push
          docker image prune -a -f
        env:
          IMG: 127.0.0.1:4242/cluster-api-outscale-controller:${{ github.sha }}
          DOCKER_BUILDKIT: 1

      - name: Retrieve NodePort Ip and NodePort
        id: retrieve-nodeport
        run: |
          echo "::set-output name=nodeport_ip::$(kubectl get nodes --namespace default -o jsonpath='{.items[0].status.addresses[0].address}')"
          echo "::set-output name=nodeport_port::$(kubectl get --namespace default -o jsonpath='{.spec.ports[0].nodePort}' services docker-registry)"
        env:
          KUBECONFIG: rke-cluster-for-cluster-api/rke/kube_config_cluster.yml

      - name: Create namespace and set credentials
        run: make credential
        shell: bash

      - name: Deploy cluster-api
        run: make deploy-clusterapi
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}

      - name: Deploy cluster-api-outscale
        run: make deploy
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}
          IMG: ${{ steps.retrieve-nodeport.outputs.nodeport_ip }}:${{ steps.retrieve-nodeport.outputs.nodeport_port }}/cluster-api-outscale-controller:${{ github.sha }}
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: '>=1.23'
      - name: Run Unit Tests
        run: make unit-test
      - name: Generate Coverage Report
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

  testenv:
    runs-on: [self-hosted, linux]
    needs: setup-tools-and-common
    steps:
      - name: Launch Functional Test
        run: make testenv

      - name: Get Logs on Failure
        run: |
          make logs-capo
          make logs-capi
        if: ${{ failure() }}

  e2etest:
    runs-on: [self-hosted, linux]
    needs: testenv
    steps:
      - name: Launch E2E Tests
        run: |
          make e2etestexistingcluster
        env:
          IMG: ${{ needs.setup-tools-and-common.outputs.nodeport_ip }}:${{ needs.setup-tools-and-common.outputs.nodeport_port }}/cluster-api-outscale-controller:${{ github.sha }}

      - name: Cleanup
        run: |
          kubectl delete crds --all || true
          kubectl delete ns --all --force --grace-period=0 || true

      - name: Destroy Cluster
        uses: ./rke-cluster-for-cluster-api/github_actions/destroy_cluster/
        if: ${{ always() }}
        with:
          repository_folder: "./rke-cluster-for-cluster-api"